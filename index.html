<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Cars | Retro Arcade Racing</title>
    <meta name="description" content="Um jogo de corrida arcade inspirado no clássico Top Gear (SNES).">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts for Retro Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu" class="overlay">
            <h1>TOP CARS</h1>
            <div class="menu-options">
                <button id="start-btn" class="retro-btn">START RACE</button>
                <div class="settings">
                    <p>Gear Type:</p>
                    <label>
                        <input type="radio" name="gear" value="auto" checked> Automatic
                    </label>
                    <label>
                        <input type="radio" name="gear" value="manual"> Manual
                    </label>
                </div>
            </div>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="top-bar">
                <div id="pos-lap">
                    <span id="pos">1st</span> / <span id="lap">LAP 1/3</span>
                </div>
                <div id="track-name">MONACO GP</div>
            </div>

            <div class="bottom-bar">
                <div class="dial-container">
                    <div class="dial" id="speedo-dial">
                        <div class="label">KM/H</div>
                        <div id="speed-val">0</div>
                    </div>
                </div>
                
                <div class="center-hud">
                    <div id="nitro-container">
                        <div class="nitro-indicator" id="nitro-1"></div>
                        <div class="nitro-indicator" id="nitro-2"></div>
                        <div class="nitro-indicator" id="nitro-3"></div>
                        <div class="label">NITRO</div>
                    </div>
                    <div id="fuel-container">
                        <div id="fuel-bar">
                            <div id="fuel-level"></div>
                        </div>
                        <div class="label">FUEL</div>
                    </div>
                </div>

                <div class="dial-container">
                    <div class="dial" id="rpm-dial">
                        <div class="label">RPM</div>
                        <div id="gear-val">1</div>
                        <div id="rpm-level"></div>
                    </div>
                </div>
            </div>
            
            <!-- Track Map -->
            <div id="mini-map">
                <canvas id="mapCanvas"></canvas>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="overlay hidden">
            <div class="loader"></div>
            <p>PREPARING ENGINE...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/assets.js"></script>
    <script src="js/track.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
